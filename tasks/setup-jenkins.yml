- name: Install Jenkins
  ansible.builtin.package:
    name: jenkins
    state: present
  notify:
    - start jenkins
    - wait for jenkins

- name: Create Jenkins directories
  ansible.builtin.file:
    path: /var/lib/jenkins/init.groovy.d
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

- name: Configure Jenkins startup parameters
  ansible.builtin.lineinfile:
    path: /etc/default/jenkins
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    backup: true
  loop:
    - regexp: '^JAVA_ARGS='
      line: 'JAVA_ARGS="-Djava.awt.headless=true -Djenkins.install.runSetupWizard=false"'
    - regexp: '^HTTP_HOST='
      line: 'HTTP_HOST=0.0.0.0'
  notify:
    - restart jenkins
    - wait for jenkins

- name: Disable setup wizard
  ansible.builtin.copy:
    content: "2.504.3"
    dest: /var/lib/jenkins/jenkins.install.InstallUtil.lastExecVersion
    owner: jenkins
    group: jenkins
    mode: '0644'

- name: Create admin user script
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: jenkins
    group: jenkins
    mode: '0644'
  with_items:
    - src: 01-security.groovy.j2
      dest: /var/lib/jenkins/init.groovy.d/01-security.groovy
    - src: 02-plugins.groovy.j2
      dest: /var/lib/jenkins/init.groovy.d/02-plugins.groovy
  notify:
    - restart jenkins
    - wait for jenkins

- name: Remove init scripts after first run
  ansible.builtin.file:
    path: /var/lib/jenkins/init.groovy.d
    state: absent
  failed_when: false