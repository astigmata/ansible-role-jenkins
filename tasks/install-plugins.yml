---
- name: Download jenkins-cli.jar
  become: true
  ansible.builtin.get_url:
    url: "{{ jenkins_url }}/jnlpJars/jenkins-cli.jar"
    dest: /tmp/jenkins-cli.jar
    mode: '0644'
  retries: 3
  delay: 5

- name: Check installed plugins via CLI
  become: true
  ansible.builtin.command:
    cmd: >
      java -jar /tmp/jenkins-cli.jar -s {{ jenkins_url }}
      -auth {{ jenkins_admin_user }}:{{ jenkins_admin_password }}
      list-plugins --format csv
  register: jenkins_installed_plugins_cli
  changed_when: false
  failed_when: false

- name: Set fact for installed plugin names
  ansible.builtin.set_fact:
    jenkins_installed_plugin_names: >-
      {{
        jenkins_installed_plugins_cli.stdout_lines
        | default([])
        | map('regex_replace', '^([^,]+),.*', '\1')
        | list
      }}

- name: Determine plugins to install
  ansible.builtin.set_fact:
    jenkins_plugins_to_install: >-
      {{
        jenkins_plugins
        | difference(jenkins_installed_plugin_names)
        | list
      }}

- name: Install Jenkins plugins via CLI (batch)
  become: true
  ansible.builtin.command:
    cmd: >
      java -jar /tmp/jenkins-cli.jar -s {{ jenkins_url }}
      -auth {{ jenkins_admin_user }}:{{ jenkins_admin_password }}
      install-plugin {{ jenkins_plugins_to_install | join(' ') }}
  when: jenkins_plugins_to_install | length > 0
  register: jenkins_plugin_install_cli
  changed_when: jenkins_plugin_install_cli.rc == 0
  notify:
    - Restart jenkins

- name: Restart jenkins if plugins were installed
  ansible.builtin.meta: flush_handlers
  when: jenkins_plugin_install_cli is changed

- name: Wait for Jenkins after plugin installation
  ansible.builtin.include_tasks: wait-for-jenkins.yml
  vars:
    jenkins_wait_retries: 30
    jenkins_wait_delay: 10
  when: jenkins_plugin_install_cli is changed

- name: Clean up jenkins-cli.jar
  become: true
  ansible.builtin.file:
    path: /tmp/jenkins-cli.jar
    state: absent
