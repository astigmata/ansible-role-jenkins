---
- name: Wait for Jenkins to start
  ansible.builtin.include_tasks: wait-for-jenkins.yml

- name: Check if Jenkins is already configured
  become: true
  ansible.builtin.stat:
    path: /var/lib/jenkins/config.xml
  register: jenkins_config_file

- name: Check if admin user already exists
  become: true
  ansible.builtin.stat:
    path: /var/lib/jenkins/users/{{ jenkins_admin_user }}/config.xml
  register: jenkins_admin_user_config

- name: Create initial security configuration
  become: true
  ansible.builtin.template:
    src: security-config.groovy.j2
    dest: /var/lib/jenkins/init.groovy.d/01-security.groovy
    owner: jenkins
    group: jenkins
    mode: '0644'
  when: not jenkins_admin_user_config.stat.exists
  notify:
    - Restart jenkins

- name: Create Jenkins URL configuration
  become: true
  ansible.builtin.template:
    src: jenkins-location.groovy.j2
    dest: /var/lib/jenkins/init.groovy.d/02-location.groovy
    owner: jenkins
    group: jenkins
    mode: '0644'
  when: not jenkins_config_file.stat.exists
  notify:
    - Restart jenkins

- name: Restart jenkins if configuration changed
  ansible.builtin.meta: flush_handlers

- name: Wait for Jenkins after configuration
  ansible.builtin.include_tasks: wait-for-jenkins.yml
  vars:
    jenkins_wait_retries: 30

- name: Remove initialization scripts after first run
  become: true
  ansible.builtin.file:
    path: /var/lib/jenkins/init.groovy.d/{{ item }}
    state: absent
  loop:
    - 01-security.groovy
    - 02-location.groovy
  when: jenkins_admin_user_config.stat.exists
