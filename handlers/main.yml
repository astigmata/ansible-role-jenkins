---
- name: Restart jenkins
  become: true
  ansible.builtin.systemd:
    name: jenkins
    state: restarted
    daemon_reload: true
  listen: Restart jenkins

- name: Wait for Jenkins after restart
  ansible.builtin.include_tasks: tasks/wait-for-jenkins.yml
  vars:
    jenkins_wait_retries: 40
    jenkins_wait_delay: 3
  listen: Restart jenkins
